<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jigsaw</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f7ead2;
        color: #5f3518;
        font-family:
          "Trebuchet MS",
          "Microsoft YaHei",
          "PingFang SC",
          system-ui,
          sans-serif;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      .main-screen {
        position: fixed;
        inset: 0;
        background-color: #f7ead2;
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
      }

      .side-nav {
        --nav-brown: #a86b35;
        --nav-brown-dark: #805024;
        --nav-line: #b77a40;
        --nav-cream: #fff8e8;
        --nav-gold: #ffc852;
        --nav-gold-light: #ffe184;
        --nav-text: #68401c;

        position: absolute;
        left: clamp(32px, 4.3vw, 70px);
        top: clamp(242px, 42.6vh, 436px);
        z-index: 2;
        display: flex;
        width: clamp(138px, 13.7vw, 210px);
        box-sizing: border-box;
        flex-direction: column;
        padding: clamp(9px, 0.7vw, 13px);
        border: 2px solid #9d642f;
        border-radius: 18px;
        background: var(--nav-brown);
      }

      .side-nav-item {
        display: flex;
        width: 100%;
        min-height: clamp(62px, 6.6vw, 92px);
        box-sizing: border-box;
        align-items: center;
        justify-content: center;
        gap: clamp(9px, 0.9vw, 15px);
        padding: 0 clamp(12px, 1.1vw, 18px);
        border: 0;
        border-radius: 14px;
        background: transparent;
        color: var(--nav-cream);
        cursor: pointer;
        font: inherit;
        font-size: clamp(24px, 2.45vw, 38px);
        font-weight: 800;
        letter-spacing: 0;
        text-align: center;
      }

      .side-nav-item + .side-nav-item {
        margin-top: clamp(8px, 0.9vw, 14px);
        border-top: 1px solid var(--nav-line);
        border-radius: 0 0 14px 14px;
        padding-top: clamp(8px, 0.9vw, 14px);
      }

      .side-nav-item-active {
        border: 2px solid #f9e5a9;
        background: linear-gradient(180deg, var(--nav-gold-light) 0%, var(--nav-gold) 100%);
        color: var(--nav-text);
      }

      .side-nav-icon {
        width: clamp(31px, 3vw, 47px);
        height: clamp(31px, 3vw, 47px);
        flex: 0 0 auto;
      }

      .side-nav-item-active .side-nav-icon {
        color: #9d6808;
      }

      .series-grid-panel {
        position: absolute;
        right: clamp(18px, 3.5vw, 58px);
        bottom: clamp(28px, 5.4vh, 60px);
        z-index: 1;
        width: min(72vw, 1150px);
        height: min(57vh, 625px);
        box-sizing: border-box;
      }

      .series-grid {
        display: grid;
        width: 100%;
        height: 100%;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
        gap: clamp(12px, 1.45vw, 24px);
      }

      .series-card {
        position: relative;
        display: grid;
        min-width: 0;
        min-height: 0;
        box-sizing: border-box;
        grid-template-rows: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: clamp(6px, 0.6vw, 10px);
        padding: clamp(14px, 1.25vw, 20px) clamp(13px, 1.15vw, 18px);
        border: 0;
        border-radius: 18px;
        background-color: transparent;
        background-position: center;
        background-repeat: no-repeat;
        background-size: 100% 100%;
        color: #5f3518;
        cursor: pointer;
        font: inherit;
      }

      .series-card-cover {
        position: relative;
        width: 100%;
        min-height: 0;
        overflow: hidden;
        border: 2px solid #efd4a0;
        border-radius: 13px;
        background: #f9e6bd;
        aspect-ratio: 1.26 / 1;
      }

      .series-card-cover img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .series-card-cover-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 34% 26%, #fff7de 0 0.35rem, transparent 0.38rem),
          linear-gradient(145deg, #ffe7b4 0%, #f4c986 100%);
      }

      .series-card-placeholder-icon {
        width: clamp(42px, 4.3vw, 68px);
        height: clamp(42px, 4.3vw, 68px);
        color: #a87532;
      }

      .series-card-badge {
        position: absolute;
        top: clamp(6px, 0.55vw, 9px);
        right: clamp(6px, 0.55vw, 9px);
        display: inline-flex;
        width: clamp(25px, 2.1vw, 34px);
        height: clamp(25px, 2.1vw, 34px);
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: #e85e4b;
        color: #fff7dc;
        font-size: clamp(14px, 1.25vw, 19px);
        font-weight: 900;
      }

      .series-card-title {
        overflow: hidden;
        color: #5d3418;
        font-size: clamp(20px, 1.95vw, 31px);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.05;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .series-card-progress {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: clamp(5px, 0.45vw, 7px);
        color: #6d421c;
        font-size: clamp(15px, 1.35vw, 22px);
        font-weight: 800;
        line-height: 1;
      }

      .series-card-star {
        width: clamp(17px, 1.55vw, 25px);
        height: clamp(17px, 1.55vw, 25px);
        color: #f7ad16;
        fill: currentColor;
      }

      @media (max-width: 720px) {
        .side-nav {
          left: 16px;
          top: 34vh;
          width: 118px;
          border-radius: 14px;
          padding: 7px;
        }

        .side-nav-item {
          min-height: 50px;
          gap: 7px;
          padding: 0 9px;
          border-radius: 11px;
          font-size: 19px;
        }

        .side-nav-icon {
          width: 26px;
          height: 26px;
        }

        .series-grid-panel {
          right: 12px;
          bottom: 22px;
          width: calc(100vw - 164px);
          height: 49vh;
        }

        .series-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
          grid-template-rows: repeat(2, minmax(0, 1fr));
          gap: 8px;
        }

        .series-card {
          gap: 4px;
          padding: 8px;
          border-radius: 13px;
        }

        .series-card-cover {
          border-radius: 9px;
        }

        .series-card-title {
          font-size: 16px;
        }

        .series-card-progress {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
