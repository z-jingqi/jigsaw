<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jigsaw</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #4a352a;
        --ink-soft: rgba(74, 53, 42, 0.72);
        --paper: rgba(255, 250, 239, 0.86);
        --paper-strong: rgba(255, 253, 246, 0.94);
        --paper-soft: rgba(255, 247, 234, 0.68);
        --line: rgba(128, 92, 62, 0.20);
        --line-strong: rgba(128, 92, 62, 0.34);
        --sakura: #e99eab;
        --sakura-deep: #c97485;
        --matcha: #7b9b68;
        --sky: #8bb6c9;
        --wood: #a9774d;
        --shadow: 0 18px 50px rgba(102, 74, 48, 0.18);
        --small-shadow: 0 10px 26px rgba(102, 74, 48, 0.14);
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f7ead2;
        overflow: hidden;
        font-family: ui-rounded, "Hiragino Maru Gothic ProN", "Yu Gothic", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(255, 246, 231, 0.26), rgba(255, 255, 255, 0.52), rgba(255, 246, 231, 0.20)),
          var(--menu-bg-image, none) center / cover no-repeat;
        z-index: -2;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.34), transparent 28%),
          linear-gradient(180deg, rgba(255, 252, 243, 0.16), rgba(238, 211, 177, 0.18));
        z-index: -1;
        pointer-events: none;
      }

      #app {
        position: fixed;
        inset: 0;
        background: var(--tablecloth-bg-image, none) center / cover no-repeat;
      }

      #app canvas {
        display: block;
        position: absolute;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1.5rem;
        background:
          linear-gradient(180deg, rgba(255, 250, 238, 0.24), rgba(244, 220, 190, 0.28)),
          rgba(255, 249, 237, 0.54);
        backdrop-filter: blur(10px) saturate(1.08);
        color: var(--ink);
        z-index: 10;
        pointer-events: auto;
        padding: 2rem;
        box-sizing: border-box;
        overflow-y: auto;
      }
      .overlay.bare {
        background: transparent;
        backdrop-filter: none;
      }

      .overlay h1 {
        font-size: clamp(2.1rem, 6vw, 4rem);
        line-height: 0.95;
        margin: 0;
        letter-spacing: 0;
        text-align: center;
        color: var(--ink);
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.64);
      }

      .overlay p {
        margin: 0;
        color: var(--ink-soft);
      }

      .overlay button {
        min-height: 46px;
        padding: 0.72rem 1.45rem;
        font-size: 1rem;
        background: linear-gradient(180deg, #fffaf0, #f7dfcd);
        color: var(--ink);
        border: 1px solid rgba(133, 91, 60, 0.28);
        border-radius: 999px;
        cursor: pointer;
        font-weight: 600;
        box-shadow: var(--small-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.75);
        transition: transform 0.13s ease, background 0.18s ease, box-shadow 0.18s ease;
      }

      .overlay button:hover {
        background: linear-gradient(180deg, #fffdf7, #f7d3d9);
        transform: translateY(-1px);
        box-shadow: 0 14px 32px rgba(137, 82, 71, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.86);
      }

      .overlay button:active { transform: translateY(0); }

      .overlay .btn-row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .overlay button.secondary {
        background: rgba(255, 250, 240, 0.58);
        color: var(--ink);
        border: 1px solid var(--line-strong);
      }

      .overlay button.secondary:hover {
        background: rgba(255, 243, 229, 0.82);
      }

      .hidden { display: none !important; }

      #main-screen {
        justify-content: flex-start;
        align-items: center;
        padding-top: min(13vh, 120px);
        background:
          linear-gradient(180deg, rgba(255, 250, 239, 0.12), rgba(255, 245, 226, 0.40) 64%, rgba(255, 247, 232, 0.72)),
          var(--menu-bg-image, none) center / cover no-repeat;
      }

      #main-screen h1 {
        max-width: min(920px, calc(100vw - 48px));
        font-size: clamp(3.2rem, 10vw, 7.6rem);
        color: #5a3a2b;
        letter-spacing: 0;
      }

      .main-tagline {
        margin-top: 0.8rem;
        padding: 0.45rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.66);
        border-radius: 999px;
        background: rgba(255, 250, 240, 0.56);
        box-shadow: 0 8px 22px rgba(143, 93, 66, 0.12);
        color: rgba(84, 59, 43, 0.72);
        font-size: 0.95rem;
      }

      .main-bottom {
        position: absolute;
        bottom: max(7vh, 42px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 0.75rem;
        align-items: center;
      }

      .main-bottom .start-btn {
        font-size: 1.1rem;
        padding: 0.85rem 2.5rem;
        min-width: 148px;
      }

      .top-back {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 20;
        width: 40px;
        height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 250, 240, 0.72);
        color: var(--ink);
        border: 1px solid rgba(128, 92, 62, 0.24);
        border-radius: 999px;
        font-size: 1.2rem;
        cursor: pointer;
        box-shadow: var(--small-shadow);
        transition: background 0.15s ease, transform 0.1s ease;
      }

      .top-back:hover {
        background: rgba(255, 246, 232, 0.94);
        transform: translateY(-1px);
      }

      .gear-btn {
        width: 40px;
        height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 250, 240, 0.72);
        color: var(--ink);
        border: 1px solid rgba(128, 92, 62, 0.24);
        border-radius: 999px;
        font-size: 1.1rem;
        cursor: pointer;
        box-shadow: var(--small-shadow);
        transition: background 0.15s ease, transform 0.1s ease;
      }

      .gear-btn:hover {
        background: rgba(255, 246, 232, 0.94);
        transform: rotate(35deg);
      }

      #global-settings-button {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 20;
      }

      .series-grid, .level-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 1.05rem;
        max-width: 820px;
        width: 100%;
      }

      .series-card, .level-card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.52rem;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .series-card {
        cursor: pointer;
        transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
      }

      .series-card:hover {
        transform: translateY(-3px);
        background: var(--paper-strong);
        border-color: rgba(197, 132, 122, 0.42);
      }

      .series-card .thumb, .level-card .thumb {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: contain;
        background:
          linear-gradient(rgba(255, 255, 255, 0.42), rgba(255, 244, 229, 0.40)),
          var(--tablecloth-bg-image, none) center / cover;
        border-radius: 8px;
        border: 1px solid rgba(128, 92, 62, 0.16);
        box-sizing: border-box;
      }

      .series-card .title, .level-card .title {
        font-weight: 700;
        font-size: 1rem;
        color: var(--ink);
      }

      .series-card .meta, .level-card .meta {
        font-size: 0.75rem;
        color: var(--ink-soft);
      }

      .level-card .difficulty-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.25rem;
      }
      .level-card .difficulty-btn {
        flex: 1 1 auto;
        min-width: 36px;
        padding: 0.45rem 0.7rem;
        font-size: 0.85rem;
        font-weight: 600;
        background: rgba(255, 250, 240, 0.70);
        color: var(--ink);
        border: 1px solid rgba(128, 92, 62, 0.20);
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
      }

      .level-card .difficulty-btn:hover {
        background: rgba(255, 236, 232, 0.88);
        border-color: rgba(201, 120, 132, 0.42);
        transform: translateY(-1px);
      }

      .level-card .difficulty-btn:active { transform: translateY(0); }

      .level-card .difficulty-btn[data-state="complete"] {
        background: rgba(194, 222, 171, 0.70);
        border-color: rgba(103, 137, 82, 0.36);
      }

      .level-card .difficulty-btn[data-state="locked"],
      .level-card .difficulty-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 30;
        background: rgba(101, 76, 51, 0.24);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        box-sizing: border-box;
      }

      .modal-panel {
        background: var(--paper-strong);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 1.25rem 1.5rem;
        width: 100%;
        max-width: 360px;
        color: var(--ink);
        font-size: 0.9rem;
        box-shadow: var(--shadow);
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.75rem;
      }

      .modal-header h2 { margin: 0; font-size: 1.15rem; }

      .modal-close {
        background: rgba(255, 248, 236, 0.70);
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--ink);
        font-size: 1.05rem;
        cursor: pointer;
        padding: 4px 9px;
      }

      .modal-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.4rem 0;
      }

      .modal-row label { flex: 1; opacity: 0.85; }
      .modal-row input[type="range"] {
        flex: 1.5;
        height: 18px;
        accent-color: var(--sakura-deep);
      }

      .modal-row input[type="range"]::-webkit-slider-runnable-track {
        height: 7px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(201, 116, 133, 0.72), rgba(123, 155, 104, 0.54));
        border: 1px solid rgba(128, 92, 62, 0.18);
      }

      .modal-row input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 18px;
        height: 18px;
        margin-top: -6px;
        border-radius: 999px;
        background: #fffaf0;
        border: 2px solid var(--sakura-deep);
        box-shadow: 0 5px 14px rgba(115, 74, 49, 0.20);
      }

      .modal-row input[type="range"]::-moz-range-track {
        height: 7px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(201, 116, 133, 0.72), rgba(123, 155, 104, 0.54));
        border: 1px solid rgba(128, 92, 62, 0.18);
      }

      .modal-row input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        background: #fffaf0;
        border: 2px solid var(--sakura-deep);
        box-shadow: 0 5px 14px rgba(115, 74, 49, 0.20);
      }

      .modal-row input[type="checkbox"] {
        appearance: none;
        width: 20px;
        height: 20px;
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        background: rgba(255, 250, 240, 0.82);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .modal-row input[type="checkbox"]::after {
        content: "";
        width: 10px;
        height: 6px;
        border-left: 2px solid #fffaf0;
        border-bottom: 2px solid #fffaf0;
        transform: rotate(-45deg) translateY(-1px);
        opacity: 0;
      }

      .modal-row input[type="checkbox"]:checked {
        background: linear-gradient(180deg, var(--sakura), var(--sakura-deep));
        border-color: rgba(148, 82, 94, 0.55);
      }

      .modal-row input[type="checkbox"]:checked::after { opacity: 1; }

      .modal-row input[type="number"] {
        width: 70px; padding: 4px 6px; font-size: 0.85rem;
        background: rgba(255, 250, 240, 0.78);
        border: 1px solid var(--line);
        color: inherit;
        border-radius: 6px;
      }

      .modal-row select {
        flex: 1.2; padding: 4px 6px; font-size: 0.85rem;
        background: rgba(255, 250, 240, 0.78);
        border: 1px solid var(--line);
        color: inherit;
        border-radius: 6px;
      }

      .modal-row .value {
        font-variant-numeric: tabular-nums;
        opacity: 0.7;
        min-width: 38px;
        text-align: right;
      }

      .modal-note {
        margin-top: 0.5rem;
        font-size: 0.75rem;
        opacity: 0.62;
        line-height: 1.3;
      }

      @media (max-width: 480px) {
        .series-grid, .level-grid { grid-template-columns: 1fr; }
        .overlay { padding: 1.25rem; }
        .main-bottom { width: calc(100% - 48px); justify-content: center; }
        .main-bottom .start-btn { flex: 1; min-width: 0; }
        #main-screen h1 { font-size: 3.15rem; }
      }

      .hud {
        position: fixed;
        top: 16px;
        left: 64px; /* leave space for back arrow when present */
        z-index: 5;
        font-size: 0.85rem;
        color: rgba(74, 53, 42, 0.78);
        background: rgba(255, 250, 240, 0.68);
        border: 1px solid rgba(128, 92, 62, 0.18);
        border-radius: 999px;
        padding: 0.5rem 0.85rem;
        box-shadow: var(--small-shadow);
        pointer-events: none;
        user-select: none;
      }

      #global-back-button {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 20;
      }
    </style>
    <style>
      /* Flat UI direction: quiet surfaces, clear edges, minimal decoration. */
      :root {
        color-scheme: light;
        --ink: #1d2320;
        --ink-soft: #5f6863;
        --ink-muted: #87918b;
        --surface: #ffffff;
        --surface-soft: #f7f8f5;
        --surface-tint: #eef3ec;
        --line: #d8dfd7;
        --line-strong: #b9c5bb;
        --accent: #3f7f5f;
        --accent-strong: #286347;
        --accent-soft: #dfeee5;
        --danger-soft: #f3e8e5;
        --shadow: none;
        --small-shadow: none;
      }

      html, body {
        background: #eef1ed;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
      }

      body::before,
      body::after {
        display: none;
      }

      #app {
        background: #edf1eb;
      }

      #app canvas {
        inset: auto;
      }

      .overlay {
        align-items: center;
        justify-content: flex-start;
        gap: 1.25rem;
        padding: 72px 24px 32px;
        background: rgba(246, 248, 245, 0.94);
        backdrop-filter: none;
        color: var(--ink);
      }

      .overlay.bare {
        background: transparent;
      }

      .overlay h1 {
        width: min(820px, 100%);
        font-size: clamp(2rem, 5vw, 4.25rem);
        line-height: 1;
        font-weight: 760;
        letter-spacing: 0;
        text-align: left;
        text-shadow: none;
        color: var(--ink);
      }

      .overlay p {
        color: var(--ink-soft);
      }

      .overlay button,
      .level-card .difficulty-btn,
      .modal-close,
      .gear-btn,
      .top-back {
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        box-shadow: none;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease, transform 0.08s ease;
      }

      .overlay button {
        min-height: 42px;
        padding: 0.64rem 1rem;
        font-size: 0.95rem;
        font-weight: 650;
      }

      .overlay button:hover,
      .level-card .difficulty-btn:hover,
      .modal-close:hover,
      .gear-btn:hover,
      .top-back:hover {
        background: var(--surface-tint);
        border-color: var(--line-strong);
        transform: none;
      }

      .overlay button:active,
      .level-card .difficulty-btn:active,
      .gear-btn:active,
      .top-back:active {
        transform: translateY(1px);
      }

      .overlay button.secondary {
        background: transparent;
        color: var(--ink-soft);
        border-color: var(--line);
      }

      .overlay button.secondary:hover {
        background: var(--surface-soft);
        color: var(--ink);
      }

      .overlay .btn-row {
        width: min(820px, 100%);
        justify-content: flex-start;
      }

      #main-screen {
        align-items: flex-start;
        justify-content: flex-start;
        padding: min(14vh, 128px) max(24px, 8vw) 40px;
        background: #eef1ed;
      }

      #main-screen h1 {
        max-width: 780px;
        font-size: clamp(3rem, 9vw, 7rem);
        line-height: 0.94;
        color: var(--ink);
      }

      .main-tagline {
        margin-top: 0.25rem;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        color: var(--ink-soft);
        font-size: clamp(1rem, 2vw, 1.2rem);
      }

      .main-bottom {
        position: static;
        transform: none;
        margin-top: 2.25rem;
        display: flex;
        gap: 0.75rem;
        align-items: center;
      }

      .main-bottom .start-btn {
        position: relative;
        min-width: 132px;
        padding: 0.9rem 1.7rem 0.74rem;
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        overflow: visible;
        isolation: isolate;
      }

      .main-bottom .start-btn:hover {
        background: var(--accent-strong);
        border-color: var(--accent-strong);
      }

      .main-bottom .start-btn::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: calc(100% - 16px);
        width: 162px;
        aspect-ratio: 560 / 331;
        background: var(--start-cat-image, none) center / contain no-repeat;
        transform: translateX(-50%);
        pointer-events: none;
        z-index: 1;
      }

      .main-bottom .start-btn::after {
        content: "";
        position: absolute;
        left: 14px;
        right: 14px;
        top: -2px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.24);
        pointer-events: none;
        z-index: 2;
      }

      .main-bottom .start-btn > span {
        position: relative;
        z-index: 3;
      }

      .gear-btn,
      .top-back {
        width: 40px;
        height: 40px;
        font-size: 1rem;
      }

      #global-settings-button,
      #global-back-button,
      .top-back {
        top: 16px;
      }

      #global-settings-button {
        right: 16px;
      }

      .gear-btn {
        width: 38px;
        height: 38px;
        min-width: 0;
        padding: 0;
        border: 0;
        background: var(--settings-gear-image) center / contain no-repeat;
        color: transparent;
        font-size: 0;
        box-shadow: none;
      }

      .gear-btn:hover,
      .gear-btn:focus,
      .gear-btn:focus-visible,
      .gear-btn:active {
        background: var(--settings-gear-image) center / contain no-repeat;
        border: 0;
        box-shadow: none;
        transform: none;
      }

      #global-back-button,
      .top-back {
        left: 16px;
      }

      #series-back-button,
      #levels-back-button,
      #global-back-button {
        display: none !important;
      }

      .hud {
        top: 16px;
        left: 64px;
        padding: 0.46rem 0.75rem;
        font-size: 0.82rem;
        color: var(--ink-soft);
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: none;
      }

      .series-grid,
      .level-grid {
        width: min(960px, 100%);
        max-width: 960px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 0.8rem;
      }

      .series-card,
      .level-card {
        gap: 0.5rem;
        padding: 0.75rem;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: none;
        backdrop-filter: none;
      }

      .series-card:hover {
        transform: none;
        background: var(--surface-soft);
        border-color: var(--line-strong);
      }

      .series-card:focus-visible,
      .level-card .difficulty-btn:focus-visible,
      .overlay button:focus-visible,
      .gear-btn:focus-visible,
      .top-back:focus-visible,
      .modal-close:focus-visible,
      .modal-row input:focus-visible,
      .modal-row select:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .series-card .thumb,
      .level-card .thumb {
        background: var(--surface-soft);
        border: 1px solid var(--line);
        border-radius: 6px;
      }

      .series-card .title,
      .level-card .title {
        color: var(--ink);
        font-size: 0.98rem;
        font-weight: 720;
      }

      .series-card .meta,
      .level-card .meta {
        color: var(--ink-muted);
        font-size: 0.74rem;
        line-height: 1.35;
      }

      .level-card .difficulty-row {
        gap: 0.4rem;
        margin-top: 0.35rem;
      }

      .level-card .difficulty-btn {
        min-height: 34px;
        padding: 0.42rem 0.6rem;

      #main-screen {

        inset: 0;

  <body>
    <div id="app"></div>
    <div id="hud" class="hud hidden">左键拖动 · 右键旋转</div>

    <!-- Main / title screen -->
    <div id="main-screen" class="overlay">
      <div class="main-scene" aria-label="猫的拼图屋主页面">
        <div class="main-title-lockup" aria-label="拼图屋">

        </div>
          <div class="main-action-layer">
            <button id="main-start-button" class="main-menu-btn start" type="button" aria-label="开始游戏"><span class="main-menu-label">开始游戏</span></button>
            <button id="main-settings-button" class="main-menu-btn settings" type="button" aria-label="设置"><span class="main-menu-label">设置</span></button>
          </div>
      </div>
    </div>

    <!-- Series picker -->
    <div id="series-list" class="overlay hidden">
      <button id="series-back-button" class="top-back" title="返回">←</button>
      <h1>选择系列</h1>
      <div id="series-grid" class="series-grid"></div>
    </div>

    <!-- Levels in a series -->
    <div id="levels-list" class="overlay hidden">
      <button id="levels-back-button" class="top-back" title="返回">←</button>
      <h1 id="levels-title">Series</h1>
      <div id="levels-grid" class="level-grid"></div>
    </div>

    <!-- Complete screen -->
    <div id="complete-screen" class="overlay hidden">
      <div class="complete-panel">
        <h1 id="complete-title">完成</h1>
        <p id="complete-subtitle">做得漂亮。</p>
        <img id="complete-image" class="complete-image" alt="" />
        <p id="complete-stats">做得漂亮。</p>
        <div class="btn-row">
          <button id="restart-button">再玩一次</button>
          <button id="back-to-levels-button" class="secondary">返回关卡</button>
        </div>
      </div>
    </div>

    <!-- Persistent top-right gear (hidden on main screen) -->
    <button id="global-back-button" class="top-back hidden" title="暂停">←</button>
    <button id="global-settings-button" class="gear-btn hidden" title="设置">⚙</button>

    <div id="pause-menu" class="overlay hidden">
      <h1>暂停</h1>
      <p id="pause-title">当前拼图</p>
      <div class="btn-row">
        <button id="pause-resume-button">继续</button>
        <button id="pause-restart-button" class="secondary">重开</button>
        <button id="pause-back-to-levels-button" class="secondary">返回关卡</button>
      </div>
    </div>

    <!-- Settings modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-panel">
        <div class="modal-header">
          <h2>设置</h2>
          <button id="settings-close-button" class="modal-close" aria-label="关闭">✕</button>
        </div>
        <div class="modal-row">
          <label for="settings-sfx">音效</label>
          <input id="settings-sfx" type="range" min="0" max="100" step="1" />
          <span id="settings-sfx-value" class="value">60%</span>
        </div>
        <div id="settings-nav" class="settings-nav hidden">
          <button id="settings-main-button" class="settings-nav-btn hidden" type="button">主界面</button>
          <button id="settings-back-button" class="settings-nav-btn hidden" type="button">返回</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
