<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jigsaw</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f7ead2;
        color: #5f3518;
        font-family:
          "Trebuchet MS",
          "Microsoft YaHei",
          "PingFang SC",
          system-ui,
          sans-serif;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      .main-screen {
        position: fixed;
        inset: 0;
        background-color: #f7ead2;
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
      }

      .side-nav {
        --nav-cream: #fff4d2;
        --nav-gold-light: #ffe9a8;
        --nav-text-active: #5a3614;
        --nav-text: #6b4523;

        position: absolute;
        left: clamp(40px, 4.2vw, 78px);
        top: clamp(150px, 17vh, 220px);
        z-index: 2;
        display: flex;
        width: clamp(150px, 12.5vw, 196px);
        box-sizing: border-box;
        flex-direction: column;
        gap: clamp(6px, 0.55vw, 10px);
        padding: 0;
        border: 0;
        background: transparent;
      }

      .side-nav-item {
        display: flex;
        width: 100%;
        min-height: clamp(46px, 4.4vw, 64px);
        box-sizing: border-box;
        align-items: center;
        justify-content: flex-start;
        gap: clamp(8px, 0.7vw, 12px);
        padding: 0 clamp(14px, 1.1vw, 20px);
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--nav-text);
        cursor: pointer;
        font: inherit;
        font-size: clamp(18px, 1.55vw, 26px);
        font-weight: 800;
        letter-spacing: 0;
        text-align: left;
      }

      .side-nav-item:hover {
        background: rgb(255 244 210 / 0.45);
      }

      .side-nav-item-active,
      .side-nav-item-active:hover {
        border: 2px solid #e9c987;
        background: linear-gradient(180deg, var(--nav-gold-light) 0%, var(--nav-cream) 100%);
        color: var(--nav-text-active);
        box-shadow: 0 2px 0 rgb(120 76 24 / 0.12);
      }

      .side-nav-icon {
        width: clamp(22px, 1.9vw, 30px);
        height: clamp(22px, 1.9vw, 30px);
        flex: 0 0 auto;
      }

      .side-nav-item-active .side-nav-icon {
        color: #9d6808;
      }

      .series-grid-panel {
        --series-page-button-size: clamp(42px, 3vw, 58px);

        position: absolute;
        top: clamp(140px, 19vh, 230px);
        right: clamp(48px, 4vw, 96px);
        bottom: clamp(48px, 6vh, 88px);
        left: clamp(248px, 19vw, 320px);
        z-index: 1;
        box-sizing: border-box;
      }

      .series-page-button {
        position: absolute;
        top: 50%;
        z-index: 2;
        display: inline-flex;
        width: var(--series-page-button-size);
        height: var(--series-page-button-size);
        align-items: center;
        justify-content: center;
        border: 2px solid #d8ad69;
        border-radius: 50%;
        background: #fff3d8;
        color: #805024;
        cursor: pointer;
        transform: translateY(-50%);
      }

      .series-page-button:disabled {
        cursor: default;
        opacity: 0.38;
      }

      .series-page-button-prev {
        left: calc(var(--series-page-button-size) * -0.45);
      }

      .series-page-button-next {
        right: calc(var(--series-page-button-size) * -1);
      }

      .series-page-icon {
        width: clamp(28px, 2.1vw, 40px);
        height: clamp(28px, 2.1vw, 40px);
        stroke-width: 3;
      }

      .series-grid {
        display: grid;
        width: 100%;
        height: 100%;
        grid-template-columns: repeat(var(--series-columns, 4), minmax(0, 1fr));
        grid-template-rows: repeat(var(--series-rows, 2), minmax(0, 1fr));
        gap: clamp(12px, 1.45vw, 24px);
      }

      .series-card {
        position: relative;
        display: grid;
        min-width: 0;
        min-height: 0;
        box-sizing: border-box;
        grid-template-rows: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: clamp(5px, 0.5vw, 9px);
        padding: clamp(10px, 0.95vw, 16px) clamp(10px, 0.9vw, 15px) clamp(8px, 0.8vw, 13px);
        border: 1.5px solid #e6c98a;
        border-radius: 16px;
        background: #fff4df;
        color: #5f3518;
        cursor: pointer;
        font: inherit;
      }

      .series-card-cover {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 0;
        box-sizing: border-box;
        overflow: hidden;
        border: 1.5px solid #ecd6a8;
        border-radius: 13px;
        background: #f9e6bd;
      }

      .series-card-cover img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .series-card-cover-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 30% 22%, rgb(255 255 255 / 0.55) 0 6%, transparent 8%),
          linear-gradient(155deg, #ffeec4 0%, #f3d29a 55%, #e9bd80 100%);
      }

      .series-card-placeholder-icon {
        width: clamp(36px, 3.6vw, 56px);
        height: clamp(36px, 3.6vw, 56px);
        color: #a8773a;
        opacity: 0.85;
      }

      .series-card-badge {
        position: absolute;
        top: clamp(6px, 0.55vw, 9px);
        right: clamp(6px, 0.55vw, 9px);
        display: inline-flex;
        width: clamp(25px, 2.1vw, 34px);
        height: clamp(25px, 2.1vw, 34px);
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: #e85e4b;
        color: #fff7dc;
        font-size: clamp(14px, 1.25vw, 19px);
        font-weight: 900;
      }

      .series-card-title {
        overflow: hidden;
        color: #5d3418;
        font-size: clamp(18px, 1.7vw, 26px);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.05;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .series-card-progress {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: clamp(5px, 0.45vw, 7px);
        color: #6d421c;
        font-size: clamp(13px, 1.15vw, 18px);
        font-weight: 800;
        line-height: 1;
      }

      .series-card-star {
        width: clamp(17px, 1.55vw, 25px);
        height: clamp(17px, 1.55vw, 25px);
        color: #f7ad16;
        fill: currentColor;
      }

      .level-list-page {
        position: absolute;
        inset: 0;
      }

      .level-back-button {
        position: absolute;
        top: clamp(28px, 4.6vh, 48px);
        left: clamp(34px, 4.2vw, 70px);
        z-index: 3;
        display: inline-flex;
        width: clamp(52px, 4.2vw, 68px);
        height: clamp(52px, 4.2vw, 68px);
        align-items: center;
        justify-content: center;
        border: 0;
        background: transparent;
        color: #805024;
        cursor: pointer;
      }

      .level-back-icon {
        width: clamp(38px, 3vw, 50px);
        height: clamp(38px, 3vw, 50px);
        stroke-width: 3.4;
      }

      .level-title-panel {
        position: absolute;
        top: clamp(30px, 4.1vh, 44px);
        left: 50%;
        z-index: 2;
        display: flex;
        width: clamp(340px, 28vw, 520px);
        aspect-ratio: 1672 / 415;
        box-sizing: border-box;
        align-items: center;
        justify-content: center;
        padding: 0 clamp(62px, 5vw, 88px) 0 clamp(78px, 6.2vw, 104px);
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
        transform: translateX(-50%);
      }

      .level-title {
        margin: 0;
        overflow: hidden;
        color: #5d3418;
        font-size: clamp(25px, 2.3vw, 38px);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .level-title-progress {
        position: absolute;
        right: clamp(48px, 3.9vw, 70px);
        bottom: clamp(17px, 1.55vw, 26px);
        color: #5f3518;
        font-size: clamp(12px, 0.9vw, 15px);
        font-weight: 900;
        line-height: 1;
      }

      .level-grid-panel {
        --level-page-button-size: clamp(42px, 3vw, 58px);

        position: absolute;
        top: 18vh;
        right: clamp(46px, 3.6vw, 92px);
        bottom: clamp(40px, 5.5vh, 80px);
        left: clamp(82px, 8vw, 150px);
        z-index: 1;
      }

      .level-grid {
        display: grid;
        width: 100%;
        height: 100%;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
        gap: clamp(12px, 1.45vw, 24px);
      }

      .level-card {
        position: relative;
        display: grid;
        min-width: 0;
        min-height: 0;
        box-sizing: border-box;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: clamp(8px, 0.75vw, 12px);
        padding: clamp(13px, 1.05vw, 18px);
        border: 2px solid #dfbd80;
        border-radius: 18px;
        background: #fff4df;
        color: #5f3518;
        cursor: pointer;
        font: inherit;
      }

      .level-card-image-frame {
        position: relative;
        min-height: 0;
        box-sizing: border-box;
        overflow: hidden;
        border: 2px solid #efd4a0;
        border-radius: 13px;
        background: #f9e6bd;
      }

      .level-card-image-frame img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .level-card-title {
        overflow: hidden;
        color: #5d3418;
        font-size: clamp(20px, 1.9vw, 31px);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.1;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .level-card-status {
        position: absolute;
        right: clamp(8px, 0.8vw, 12px);
        bottom: clamp(8px, 0.8vw, 12px);
        display: inline-flex;
        gap: clamp(5px, 0.45vw, 8px);
        box-sizing: border-box;
        align-items: center;
        color: #807462;
      }

      .level-card-status-completed {
        color: #f8ae12;
      }

      .level-card-status-icon {
        width: clamp(20px, 1.7vw, 28px);
        height: clamp(20px, 1.7vw, 28px);
        fill: #d9d0c1;
        opacity: 0.72;
        stroke: #746957;
        stroke-width: 2.6;
        filter: drop-shadow(0 1px 1px rgb(65 48 30 / 0.18));
      }

      .level-card-status-completed .level-card-status-icon {
        fill: #ffc233;
        opacity: 1;
        stroke: #7b4d16;
        filter: drop-shadow(0 2px 2px rgb(72 43 8 / 0.34));
      }

      .level-page-button {
        position: absolute;
        top: 50%;
        z-index: 2;
        display: inline-flex;
        width: var(--level-page-button-size);
        height: var(--level-page-button-size);
        align-items: center;
        justify-content: center;
        border: 2px solid #d8ad69;
        border-radius: 50%;
        background: #fff3d8;
        color: #805024;
        cursor: pointer;
        transform: translateY(-50%);
      }

      .level-page-button-prev {
        left: calc(var(--level-page-button-size) * -0.45);
      }

      .level-page-button-next {
        right: calc(var(--level-page-button-size) * -1);
      }

      .level-page-icon {
        width: clamp(28px, 2.1vw, 40px);
        height: clamp(28px, 2.1vw, 40px);
        stroke-width: 3;
      }

      .game-screen {
        --game-cream: #fff0cf;
        --game-border: #d5a564;
        --game-text: #603a18;
        --game-green: #86bd36;

        position: fixed;
        inset: 0;
        overflow: hidden;
        background: #eacb98;
      }

      .game-stage-host {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .game-stage-host canvas {
        position: absolute;
        inset: 0;
        display: block;
      }

      .game-loading {
        position: absolute;
        top: 50%;
        left: 50%;
        z-index: 5;
        color: var(--game-text);
        font-size: 20px;
        font-weight: 900;
        transform: translate(-50%, -50%);
      }

      .game-hud {
        position: absolute;
        top: clamp(18px, 2.4vh, 34px);
        left: clamp(22px, 2.5vw, 42px);
        right: clamp(22px, 2.5vw, 42px);
        z-index: 10;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        pointer-events: none;
      }

      .game-timer,
      .game-control {
        display: inline-flex;
        min-height: clamp(48px, 4.3vw, 62px);
        box-sizing: border-box;
        align-items: center;
        justify-content: center;
        gap: clamp(8px, 0.75vw, 12px);
        border: 2px solid var(--game-border);
        border-radius: 16px;
        background: var(--game-cream);
        color: var(--game-text);
        font: inherit;
        font-size: clamp(16px, 1.25vw, 22px);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        pointer-events: auto;
      }

      .game-timer {
        min-width: clamp(132px, 10vw, 170px);
        padding: 0 clamp(14px, 1.15vw, 20px);
      }

      .game-actions {
        display: inline-flex;
        align-items: center;
        gap: clamp(10px, 0.9vw, 16px);
        pointer-events: none;
      }

      .game-control {
        padding: 0 clamp(14px, 1.1vw, 20px);
        cursor: pointer;
      }

      .game-control:hover,
      .game-control-active {
        background: #ffe0a3;
      }

      .game-control-pulse {
        animation: game-control-pulse 360ms ease;
      }

      .game-hud-icon {
        width: clamp(23px, 1.9vw, 32px);
        height: clamp(23px, 1.9vw, 32px);
        flex: 0 0 auto;
      }

      .game-control[title^='高亮'] .game-hud-icon {
        color: #e3a017;
      }

      .game-control[title^='全部'] .game-hud-icon {
        color: #7c9f2f;
      }

      @keyframes game-control-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
      }

      .pause-modal-overlay {
        position: absolute;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: clamp(18px, 3vh, 42px);
        background: rgb(37 24 12 / 0.48);
        backdrop-filter: blur(1px);
      }

      .pause-modal-overlay[hidden] {
        display: none;
      }

      .pause-modal {
        position: relative;
        display: grid;
        width: min(82vw, 560px);
        max-height: min(88vh, 660px);
        aspect-ratio: 949 / 1116;
        box-sizing: border-box;
        grid-template-rows: auto auto 1fr;
        justify-items: center;
        padding:
          clamp(6px, 1.1vh, 12px)
          clamp(26px, 3vw, 42px)
          clamp(10px, 1.4vh, 16px);
        border-style: solid;
        border-width: clamp(34px, 4.2vw, 54px);
        border-image-source: var(--pause-panel-bg);
        border-image-slice: 96 fill;
        border-image-width: clamp(34px, 4.2vw, 54px);
        border-image-repeat: stretch;
        color: #603a18;
      }

      .pause-close-button {
        position: absolute;
        top: clamp(8px, 1.4vh, 18px);
        right: clamp(8px, 1.4vh, 18px);
        display: inline-flex;
        width: clamp(42px, 4.8vw, 58px);
        height: clamp(42px, 4.8vw, 58px);
        align-items: center;
        justify-content: center;
        border: 2px solid #d3a35e;
        border-radius: 50%;
        background: #fff2d2;
        color: #8b5722;
        cursor: pointer;
        filter: drop-shadow(0 3px 2px rgb(92 57 20 / 0.16));
      }

      .pause-close-icon {
        width: 62%;
        height: 62%;
        stroke-width: 3.5;
      }

      .pause-title {
        margin: clamp(2px, 0.7vh, 8px) 0 0;
        color: #5a3417;
        font-size: clamp(36px, 5vw, 56px);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.05;
        text-align: center;
      }

      .pause-cat {
        display: block;
        width: min(78%, 360px);
        margin-top: clamp(8px, 1.5vh, 16px);
        object-fit: contain;
        pointer-events: none;
        user-select: none;
      }

      .pause-actions {
        display: grid;
        width: min(100%, 390px);
        align-self: end;
        gap: clamp(10px, 1.45vh, 15px);
        margin-bottom: clamp(0px, 1vh, 8px);
      }

      .pause-action {
        display: inline-flex;
        min-height: clamp(48px, 6.2vh, 64px);
        box-sizing: border-box;
        align-items: center;
        justify-content: center;
        gap: clamp(18px, 2vw, 26px);
        border: 2px solid #d8a968;
        border-radius: 18px;
        background: linear-gradient(180deg, #fff7e5 0%, #ffeccc 100%);
        color: #74471e;
        cursor: pointer;
        font: inherit;
        font-size: clamp(23px, 3vw, 32px);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 0.72),
          0 3px 0 rgb(148 91 34 / 0.18);
      }

      .pause-action-primary {
        border-color: #638b25;
        background: linear-gradient(180deg, #a8cf45 0%, #7cad2f 100%);
        color: #fffaf0;
        text-shadow: 0 1px 0 rgb(62 84 19 / 0.35);
      }

      .pause-action-danger {
        border-color: #cc5e45;
        background: linear-gradient(180deg, #ff896d 0%, #ed6d55 100%);
        color: #fff6ee;
        text-shadow: 0 1px 0 rgb(112 39 24 / 0.32);
      }

      .pause-action-icon {
        width: clamp(25px, 3vw, 34px);
        height: clamp(25px, 3vw, 34px);
        flex: 0 0 auto;
        stroke-width: 2.8;
      }

      @media (max-width: 720px) {
        .side-nav {
          left: 16px;
          top: 18vh;
          width: 132px;
          gap: 6px;
        }

        .side-nav-item {
          min-height: 44px;
          gap: 7px;
          padding: 0 12px;
          font-size: 17px;
        }

        .side-nav-icon {
          width: 22px;
          height: 22px;
        }

        .series-grid-panel {
          right: 12px;
          bottom: 22px;
          width: calc(100vw - 164px);
          height: 49vh;
        }

        .series-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
          grid-template-rows: repeat(2, minmax(0, 1fr));
          gap: 8px;
        }

        .series-card {
          gap: 4px;
          padding: 8px;
          border-radius: 13px;
        }

        .series-card-cover {
          border-radius: 9px;
        }

        .series-card-title {
          font-size: 16px;
        }

        .series-card-progress {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
